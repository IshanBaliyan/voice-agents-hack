# Per-PDF metadata used by scripts/build_rag_index.py and rag_index.py.
#
# `make` and `model` are stored in the Qdrant payload as lowercase strings
# with no spaces/dashes (e.g. "f-150" -> "f150", "grand cherokee" -> "grandcherokee")
# so retrieval filters can match voice input like "I have a 2018 Toyota Camry"
# after the same normalization is applied.
#
# Fields:
#   file     — PDF filename inside cactus_server/docs/ (required, unique)
#   make     — normalized lowercase make (required)
#   model    — normalized lowercase model (required)
#   year     — integer model year, or null if unknown
#   display  — human-readable label (shown in logs / iOS UI)
#   aliases  — optional extra tokens that should match this entry when heard
#              in speech (e.g. "f-one-fifty", "crv" vs "cr-v")

entries:
  - file: vw_jetta.pdf
    make: volkswagen
    model: jetta
    year: 2011
    display: "2011 Volkswagen Jetta"
    aliases: [vw]

  - file: 2023_ford_f150.pdf
    make: ford
    model: f150
    year: 2023
    display: "2023 Ford F-150"
    aliases: ["f-150"]

  - file: 2023_ford_explorer.pdf
    make: ford
    model: explorer
    year: 2023
    display: "2023 Ford Explorer"

  - file: 2024_chevy_silverado1500.pdf
    make: chevrolet
    model: silverado1500
    year: 2024
    display: "2024 Chevrolet Silverado 1500"
    aliases: [chevy, "silverado 1500", silverado]

